[functions]
  directory = "netlify/functions"

[functions."ai-chat"]
  timeout = 26

[[edge_functions]]
  path = "/api/ai-chat"
  function = "ai-chat"

[build]
  command = "npm install && npm run build"
  publish = "dist"

[build.environment]
  # Firebase API keys are public by design (security is enforced by Firestore rules)
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
